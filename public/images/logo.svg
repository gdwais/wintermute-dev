<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 40" fill="none">
  <!-- Terminal prompt > (pixel-style, cyan) -->
  <text x="0" y="30" font-family="'Courier New', monospace" font-size="32" font-weight="700" fill="#00f0ff">&#x203A;</text>
  <!-- Wintermute (white) -->
  <text x="28" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="600" fill="#e0e0f0" letter-spacing="-0.5">Wintermute</text>
  <!-- Dev (cyan) -->
  <text x="228" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="600" fill="#00f0ff" letter-spacing="-0.5">Dev</text>
  <!-- Underscore cursor (cyan) -->
  <text x="282" y="30" font-family="'Courier New', monospace" font-size="26" font-weight="700" fill="#00f0ff">_</text>
</svg>
